<div class="auth-container">
  <div class="auth-card glass-panel">

    <div class="auth-header">
      <div class="auth-logo">⚡ SmartTask<span class="pro">Pro</span></div>
      <h2>Welcome Back</h2>
      <p>Sign in to manage your tasks</p>
    </div>

    <div class="demo-hint">
      🎮 <strong>Demo mode</strong> — enter any username &amp; password to continue
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="credentials.username"
            required
            placeholder="e.g. admin"
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            required
            placeholder="Any password works"
            autocomplete="current-password"
          >
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary auth-submit" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Sign In →</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
      </div>
    </form>
  </div>
</div>
